<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>

<body>

<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/create}">Add Product</a>
    </div>
</nav>

<div class="container body-content mt-5">
    <h1 class="mb-4">Edit Product</h1>

    <h1 class="mb-4">Edit Product</h1>

    <form th:action="@{/products/edit}"
          th:object="${product}"
          method="post"
          class="form"
          enctype="multipart/form-data">

        <!-- HIDDEN ID -->
        <input type="hidden" th:field="*{id}">

        <!-- NAME -->
        <div class="form-group mb-3">
            <label for="name">Name:</label>
            <input class="form-control"
                   type="text"
                   th:field="*{name}"
                   placeholder="product Name"
                   id="name">

            <div class="alert alert-warning mt-2"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <!-- PRICE -->
        <div class="form-group mb-3">
            <label for="price">Price:</label>
            <input class="form-control"
                   type="number"
                   th:field="*{price}"
                   placeholder="price"
                   id="price">

            <div class="alert alert-warning mt-2"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}">
            </div>
        </div>

        <!-- CATEGORY -->
        <div class="form-group mb-3">
            <label for="categoryId">Category:</label>
            <select class="form-select"
                    name="category.id"
                    id="categoryId">
                <option value="">-- Select Category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"
                        th:selected="${product.category?.id == category.id}">
                </option>
            </select>
        </div>

        <!-- IMAGE -->
        <div class="form-group mb-3">
            <label for="imageProduct">Product Image:</label>
            <input class="form-control"
                   type="file"
                   name="imageProduct"
                   id="imageProduct"
                   accept="image/*">
            
            <div th:if="${product.image}" class="mt-2">
                <p>Current image:</p>
                <img th:src="@{/images/{img}(img=${product.image})}" 
                     alt="Current Image" 
                     style="max-width: 200px; height: auto;">
            </div>
        </div>

        <!-- SUBMIT -->
        <div class="form-group">
            <button class="btn btn-success" type="submit">Update Product</button>
            <a href="/products" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

</div>

<div class="card-footer text-center mt-5">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
