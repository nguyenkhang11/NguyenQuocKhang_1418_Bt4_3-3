<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Products List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>

<body>

<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/create}">Add Product</a>
    </div>
</nav>

<div class="container body-content mt-5">
    <h1 class="mb-4">Products List</h1>
    
    <a href="/products/create" class="btn btn-primary mb-3">Add New Product</a>
    
    <div th:if="${listproduct.isEmpty()}" class="alert alert-info">
        No products found. <a href="/products/create">Create one now</a>
    </div>
    
    <div th:unless="${listproduct.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th>Image</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${listproduct}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.price}"></td>
                        <td th:text="${product.category?.name}"></td>
                        <td>
                            <img th:if="${product.image}" 
                                 th:src="@{/images/{img}(img=${product.image})}" 
                                 alt="Image" 
                                 style="width: 50px; height: 50px; object-fit: cover;">
                            <span th:unless="${product.image}">No image</span>
                        </td>
                        <td>
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                               class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                               class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="card-footer text-center mt-5">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
